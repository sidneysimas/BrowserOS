name: Nightly macOS Build

on:
  schedule:
    # About 9 PM US Pacific during daylight saving time. GitHub cron is UTC.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump level
        type: choice
        default: offset+build
        options:
          - offset-only
          - offset+build
          - offset+patch
          - none
      commit_version:
        description: Commit and push the version bump to the built branch
        type: boolean
        default: false
      upload_to_r2:
        description: Publish build to R2/CDN after packaging
        type: boolean
        default: true
      release_server:
        description: Build and upload server artifacts before packaging
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: macos-build
  cancel-in-progress: false

jobs:
  resolve_inputs:
    runs-on: ubuntu-latest
    outputs:
      target_ref: ${{ steps.workflow_inputs.outputs.target_ref }}
      bump_mode: ${{ steps.workflow_inputs.outputs.bump_mode }}
      commit_version: ${{ steps.workflow_inputs.outputs.commit_version }}
      upload_to_r2: ${{ steps.workflow_inputs.outputs.upload_to_r2 }}
      release_server: ${{ steps.workflow_inputs.outputs.release_server }}
      server_version: ${{ steps.server_version.outputs.server_version }}
    steps:
      - name: Resolve workflow inputs
        id: workflow_inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          NIGHTLY_REF: ${{ vars.BROWSEROS_NIGHTLY_REF }}
          NIGHTLY_RELEASE_SERVER: ${{ vars.BROWSEROS_NIGHTLY_RELEASE_SERVER }}
          DISPATCH_BUMP: ${{ inputs.bump }}
          DISPATCH_COMMIT_VERSION: ${{ inputs.commit_version }}
          DISPATCH_UPLOAD_TO_R2: ${{ inputs.upload_to_r2 }}
          DISPATCH_RELEASE_SERVER: ${{ inputs.release_server }}
          DISPATCH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "schedule" ]; then
            target_ref="${NIGHTLY_REF:-$DEFAULT_BRANCH}"
            bump_mode="offset+build"
            commit_version="true"
            upload_to_r2="true"
            release_server="${NIGHTLY_RELEASE_SERVER:-auto}"
          else
            target_ref="$DISPATCH_REF"
            bump_mode="${DISPATCH_BUMP:-offset+build}"
            commit_version="${DISPATCH_COMMIT_VERSION:-false}"
            upload_to_r2="${DISPATCH_UPLOAD_TO_R2:-true}"
            release_server="${DISPATCH_RELEASE_SERVER:-true}"
          fi

          if [ "$release_server" = "auto" ]; then
            if [ "$target_ref" = "$DEFAULT_BRANCH" ]; then
              release_server="true"
            else
              release_server="false"
            fi
          fi

          if [ "$release_server" != "true" ] && [ "$release_server" != "false" ]; then
            echo "::error::release_server must be true, false, or auto (got $release_server)"
            exit 1
          fi

          if [ "$release_server" = "true" ] && [ "$target_ref" != "$DEFAULT_BRANCH" ]; then
            echo "::error::Server release publishes to global R2 latest and is only allowed for $DEFAULT_BRANCH. Disable release_server for branch-only macOS builds."
            exit 1
          fi

          {
            echo "target_ref=$target_ref"
            echo "bump_mode=$bump_mode"
            echo "commit_version=$commit_version"
            echo "upload_to_r2=$upload_to_r2"
            echo "release_server=$release_server"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.workflow_inputs.outputs.target_ref }}

      - name: Read server package version
        id: server_version
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          package_json = Path("packages/browseros-agent/apps/server/package.json")
          version = json.loads(package_json.read_text())["version"]
          print(f"server_version={version}")
          PY

  authorize_manual_dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, macOS, ARM64, browseros-builder]
    environment: release-core
    steps:
      - run: echo "Manual dispatch approved through release-core."

  release_server:
    needs: [authorize_manual_dispatch, resolve_inputs]
    if: |
      always() &&
      needs.resolve_inputs.result == 'success' &&
      needs.resolve_inputs.outputs.release_server == 'true' &&
      (github.event_name == 'schedule' || needs.authorize_manual_dispatch.result == 'success')
    permissions:
      contents: write
      pull-requests: read
    uses: ./.github/workflows/release-server.yml
    with:
      version: ${{ needs.resolve_inputs.outputs.server_version }}
      apply_bump: ${{ needs.resolve_inputs.outputs.bump_mode != 'none' }}
      targets: darwin-arm64
      publish_github_release: false
    secrets: inherit

  build:
    needs: [authorize_manual_dispatch, resolve_inputs, release_server]
    if: |
      always() &&
      needs.resolve_inputs.result == 'success' &&
      (github.event_name == 'schedule' || needs.authorize_manual_dispatch.result == 'success') &&
      (needs.resolve_inputs.outputs.release_server != 'true' || needs.release_server.result == 'success')
    runs-on: [self-hosted, macOS, ARM64, browseros-builder]
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 600
    env:
      BROWSEROS_REPO: ${{ vars.BROWSEROS_REPO_PATH }}
      CHROMIUM_SRC: ${{ vars.BROWSEROS_CHROMIUM_SRC }}
    steps:
      - name: Resolve build inputs
        id: build_inputs
        env:
          TARGET_REF: ${{ needs.resolve_inputs.outputs.target_ref }}
          BUMP_MODE: ${{ needs.resolve_inputs.outputs.bump_mode }}
          COMMIT_VERSION: ${{ needs.resolve_inputs.outputs.commit_version }}
          UPLOAD_TO_R2: ${{ needs.resolve_inputs.outputs.upload_to_r2 }}
        run: |
          set -euo pipefail

          repo="${BROWSEROS_REPO:-}"
          chromium_src="${CHROMIUM_SRC:-}"
          if [ -z "$repo" ]; then
            echo "::error::Set repository variable BROWSEROS_REPO_PATH"
            exit 1
          fi
          if [ -z "$chromium_src" ]; then
            echo "::error::Set repository variable BROWSEROS_CHROMIUM_SRC"
            exit 1
          fi

          repo="${repo/#\~/$HOME}"
          chromium_src="${chromium_src/#\~/$HOME}"
          if [ ! -d "$repo/.git" ]; then
            echo "::error::BROWSEROS_REPO_PATH does not point to a git checkout: $repo"
            exit 1
          fi
          if [ ! -d "$chromium_src" ]; then
            echo "::error::BROWSEROS_CHROMIUM_SRC does not exist: $chromium_src"
            exit 1
          fi

          {
            echo "browseros_repo=$repo"
            echo "chromium_src=$chromium_src"
            echo "target_ref=$TARGET_REF"
            echo "bump_mode=$BUMP_MODE"
            echo "commit_version=$COMMIT_VERSION"
            echo "upload_to_r2=$UPLOAD_TO_R2"
          } >> "$GITHUB_OUTPUT"

      - name: Sync build repo to target ref
        env:
          BROWSEROS_REPO: ${{ steps.build_inputs.outputs.browseros_repo }}
          TARGET_REF: ${{ steps.build_inputs.outputs.target_ref }}
        run: |
          set -euo pipefail
          cd "$BROWSEROS_REPO"
          git fetch origin --tags --prune
          # Wipe any local edits before switching refs. The builder's working
          # tree can carry stray modifications to tracked files, which would
          # otherwise make the checkout below abort before reset --hard runs.
          git reset --hard
          git clean -fd
          if git show-ref --verify --quiet "refs/remotes/origin/$TARGET_REF"; then
            git checkout -B "$TARGET_REF" "origin/$TARGET_REF"
            git reset --hard "origin/$TARGET_REF"
          else
            git checkout -f "$TARGET_REF"
            git reset --hard "$TARGET_REF"
          fi

      - name: Bump version
        id: bump
        env:
          BROWSEROS_REPO: ${{ steps.build_inputs.outputs.browseros_repo }}
          BUMP_MODE: ${{ steps.build_inputs.outputs.bump_mode }}
        run: |
          set -euo pipefail
          cd "$BROWSEROS_REPO/packages/browseros"
          version="$(uv run python build/scripts/bump_version.py --mode "$BUMP_MODE")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Built version: $version"

      - name: Apply server version bump
        if: ${{ needs.resolve_inputs.outputs.release_server == 'true' && needs.release_server.outputs.server_version != '' }}
        env:
          BROWSEROS_REPO: ${{ steps.build_inputs.outputs.browseros_repo }}
          SERVER_VERSION: ${{ needs.release_server.outputs.server_version }}
        run: |
          set -euo pipefail
          cd "$BROWSEROS_REPO/packages/browseros"
          uv run python build/scripts/bump_server_version.py --set "$SERVER_VERSION"
          echo "Applied server version $SERVER_VERSION to the build working tree"

      - name: Commit version bump via pull request
        if: ${{ steps.build_inputs.outputs.commit_version == 'true' }}
        env:
          BROWSEROS_REPO: ${{ steps.build_inputs.outputs.browseros_repo }}
          TARGET_REF: ${{ steps.build_inputs.outputs.target_ref }}
          VERSION: ${{ steps.bump.outputs.version }}
          RELEASE_SERVER: ${{ needs.resolve_inputs.outputs.release_server }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          cd "$BROWSEROS_REPO"
          version_files=(
            packages/browseros/resources/BROWSEROS_VERSION
            packages/browseros/build/config/BROWSEROS_BUILD_OFFSET
          )
          # When the server was released this run, fold its bumped version into the
          # same PR so the browser and server versions land together.
          if [ "$RELEASE_SERVER" = "true" ]; then
            version_files+=(
              packages/browseros-agent/apps/server/package.json
              packages/browseros-agent/bun.lock
            )
          fi
          git add "${version_files[@]}"
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git -c user.name="BrowserOS CI" -c user.email="ci@browseros.com" \
            commit -m "chore(release): build v$VERSION [skip ci]"

          safe_target_ref="${TARGET_REF//[^A-Za-z0-9._-]/-}"
          branch="bot/nightly-macos-version-${safe_target_ref}-v${VERSION}"
          expected_sha="$(git ls-remote --heads origin "$branch" | awk '{print $1}')"
          if [ -n "$expected_sha" ]; then
            git push --force-with-lease="refs/heads/$branch:$expected_sha" \
              origin "HEAD:refs/heads/$branch"
          else
            git push origin "HEAD:refs/heads/$branch"
          fi

          pr_url="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base "$TARGET_REF" \
            --head "$branch" \
            --state open \
            --json url \
            --jq '.[0].url // ""')"
          if [ -z "$pr_url" ]; then
            pr_body="$(mktemp)"
            trap 'rm -f "$pr_body"' EXIT
            cat > "$pr_body" <<EOF
          Automated nightly macOS version bump for v$VERSION.

          Source run: $RUN_URL
          Target ref: $TARGET_REF
          EOF
            pr_url="$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$TARGET_REF" \
              --head "$branch" \
              --title "chore(release): build v$VERSION" \
              --body-file "$pr_body")"
          fi

          echo "Version bump PR: $pr_url"
          if gh pr merge "$pr_url" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --delete-branch \
            --subject "chore(release): build v$VERSION [skip ci]" \
            --body "Automated nightly macOS version bump."; then
            exit 0
          fi

          merge_state="$(gh pr view "$pr_url" \
            --repo "$GITHUB_REPOSITORY" \
            --json mergeStateStatus \
            --jq '.mergeStateStatus // "UNKNOWN"' || echo "UNKNOWN")"
          failed_checks="$(gh pr view "$pr_url" \
            --repo "$GITHUB_REPOSITORY" \
            --json statusCheckRollup \
            --jq '[.statusCheckRollup[]? | select((.__typename == "CheckRun" and ((.conclusion // "") == "FAILURE" or (.conclusion // "") == "CANCELLED" or (.conclusion // "") == "TIMED_OUT" or (.conclusion // "") == "ACTION_REQUIRED")) or (.__typename == "StatusContext" and ((.state // "") == "FAILURE" or (.state // "") == "ERROR")))] | length' || echo "0")"
          if [ "$merge_state" = "DIRTY" ] || [ "$failed_checks" -gt 0 ]; then
            echo "::warning::Leaving version bump PR open (mergeStateStatus=$merge_state, failedChecks=$failed_checks): $pr_url"
            exit 0
          fi

          if gh pr merge "$pr_url" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --squash \
            --delete-branch \
            --subject "chore(release): build v$VERSION [skip ci]" \
            --body "Automated nightly macOS version bump."; then
            echo "Enabled auto-merge for version bump PR: $pr_url"
          else
            echo "::warning::Could not merge or enable auto-merge for version bump PR; leaving it open: $pr_url"
          fi

      - name: Build BrowserOS (macOS arm64)
        env:
          BROWSEROS_REPO: ${{ steps.build_inputs.outputs.browseros_repo }}
          CHROMIUM_SRC: ${{ steps.build_inputs.outputs.chromium_src }}
          UPLOAD_TO_R2: ${{ steps.build_inputs.outputs.upload_to_r2 }}
        run: |
          set -euo pipefail
          cd "$BROWSEROS_REPO/packages/browseros"
          config="build/config/release.macos.arm64.yaml"
          if [ "$UPLOAD_TO_R2" != "true" ]; then
            config="build/config/release.macos.arm64.noupload.yaml"
          fi
          uv run browseros build --config "$config" --chromium-src "$CHROMIUM_SRC"

      - name: Upload DMG artifact
        if: ${{ always() && steps.bump.outputs.version != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: BrowserOS_v${{ steps.bump.outputs.version }}_arm64
          path: ${{ steps.build_inputs.outputs.browseros_repo }}/packages/browseros/releases/${{ steps.bump.outputs.version }}/*.dmg
          retention-days: 14
          if-no-files-found: warn

      - name: Slack failure ping
        if: ${{ failure() }}
        env:
          BROWSEROS_REPO: ${{ steps.build_inputs.outputs.browseros_repo }}
          TARGET_REF: ${{ steps.build_inputs.outputs.target_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          hook="$(
            python3 - <<'PY'
          import os
          from pathlib import Path

          env_file = Path(os.environ["BROWSEROS_REPO"]) / "packages/browseros/.env"
          if not env_file.exists():
              raise SystemExit(0)
          for line in env_file.read_text().splitlines():
              if line.startswith("SLACK_WEBHOOK_URL="):
                  print(line.split("=", 1)[1].strip().strip("'\""))
                  break
          PY
          )"
          if [ -z "$hook" ]; then
            exit 0
          fi
          python3 - <<'PY' > /tmp/browseros-nightly-slack-payload.json
          import json
          import os

          print(
              json.dumps(
                  {
                      "text": (
                          ":x: Nightly macOS build failed on "
                          f"`{os.environ['TARGET_REF']}` - {os.environ['RUN_URL']}"
                      )
                  }
              )
          )
          PY
          curl -fsS -X POST -H "Content-type: application/json" \
            --data @/tmp/browseros-nightly-slack-payload.json "$hook" || true
