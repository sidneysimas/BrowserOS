# Required secrets for resource publishing: R2_ACCOUNT_ID, R2_ACCESS_KEY_ID,
# R2_SECRET_ACCESS_KEY, R2_BUCKET, BROWSEROS_CONFIG_URL, POSTHOG_API_KEY,
# SENTRY_DSN. SPARKLE_PRIVATE_KEY is required only when publish_ota is true.
name: "Release: BrowserOS Server"

on:
  push:
    tags:
      - "agent-server/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.0.124"
        required: true
        type: string
      ref:
        description: "Git ref to release; defaults to the repository default branch"
        required: false
        type: string
        default: ""
      publish_ota:
        description: "Publish alpha-channel server OTA artifacts after R2 upload"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: "Release version; defaults to apps/server/package.json at ref"
        required: false
        type: string
        default: ""
      ref:
        description: "Git ref to release; defaults to the repository default branch"
        required: false
        type: string
        default: ""
      publish_ota:
        description: "Publish alpha-channel server OTA artifacts after R2 upload"
        required: false
        type: boolean
        default: false
    secrets:
      R2_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      R2_BUCKET:
        required: true
      BROWSEROS_CONFIG_URL:
        required: true
      POSTHOG_API_KEY:
        required: true
      SENTRY_DSN:
        required: true
      SPARKLE_PRIVATE_KEY:
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-server
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || github.event.deleted != true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      previous_tag: ${{ steps.release.outputs.previous_tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && (github.event.repository.default_branch || 'main') || (inputs.ref || github.event.repository.default_branch || 'main') }}

      - name: Resolve release
        id: release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail
          packages/browseros-agent/scripts/release/prepare-server-release.sh \
            --event-name "$EVENT_NAME" \
            --default-branch "$DEFAULT_BRANCH" \
            --ref-name "$REF_NAME" \
            --requested-version "$REQUESTED_VERSION" \
            --release-ref HEAD

      - name: Generate release notes
        env:
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -euo pipefail
          CHANGELOG_FILE="/tmp/release-changelog.md"
          NOTES_FILE="/tmp/release-notes.md"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "Initial BrowserOS Server release." > "$CHANGELOG_FILE"
          else
            git log "$PREVIOUS_TAG..$RELEASE_SHA" --pretty=format:"- %s (%h)" > "$CHANGELOG_FILE"
            if [ ! -s "$CHANGELOG_FILE" ]; then
              echo "No commits since $PREVIOUS_TAG." > "$CHANGELOG_FILE"
            fi
          fi

          node packages/browseros-agent/scripts/release/cap-release-changelog.mjs \
            --input "$CHANGELOG_FILE" \
            --output "$NOTES_FILE" \
            --max-entries 15 \
            --previous-tag "$PREVIOUS_TAG" \
            --release-tag "$RELEASE_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          TITLE="BrowserOS Server - v$VERSION"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md
          fi

          if [ "$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')" = "true" ]; then
            gh release edit "$RELEASE_TAG" --draft=false
          fi

  build-publish:
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.release.outputs.version }}
      RELEASE_TAG: ${{ needs.release.outputs.tag }}
      PUBLISH_OTA: ${{ inputs.publish_ota || false }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      BROWSEROS_CONFIG_URL: ${{ secrets.BROWSEROS_CONFIG_URL }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      NODE_ENV: production
      LOG_LEVEL: info

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ needs.release.outputs.release_sha }}

      - name: Preflight required secrets
        run: |
          set -euo pipefail
          required=(
            R2_ACCOUNT_ID
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            R2_BUCKET
            BROWSEROS_CONFIG_URL
            POSTHOG_API_KEY
            SENTRY_DSN
          )
          if [ "${PUBLISH_OTA:-false}" = "true" ]; then
            required+=(SPARKLE_PRIVATE_KEY)
          fi

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install Wine for Windows metadata patching
        run: |
          set -euo pipefail
          sudo apt-get update
          # The `wine` package provides the /usr/bin/wine wrapper that
          # patch-windows-exe.ts spawns; ubuntu-24.04's wine64 alone ships
          # only the loader at /usr/lib/wine/wine64 (no /usr/bin entry).
          sudo apt-get install -y --no-install-recommends wine
          if ! command -v wine >/dev/null; then
            sudo ln -s /usr/lib/wine/wine64 /usr/local/bin/wine
          fi
          wine --version

      - name: Install browseros-agent dependencies
        working-directory: packages/browseros-agent
        run: bun ci

      - name: Stamp release version for artifacts
        working-directory: packages/browseros-agent
        run: |
          set -euo pipefail
          python3 - "$VERSION" <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          version = sys.argv[1]
          pkg_path = Path("apps/server/package.json")
          lock_path = Path("bun.lock")

          pkg = json.loads(pkg_path.read_text())
          pkg["version"] = version
          pkg_path.write_text(json.dumps(pkg, indent=2) + "\n")

          lock = lock_path.read_text()
          pattern = re.compile(r'("apps/server":\s*\{\s*"name":\s*"@browseros/server",\s*"version":\s*")([^"]+)(")')
          updated, count = pattern.subn(rf"\g<1>{version}\3", lock)
          if count != 1:
            raise SystemExit(f"Expected exactly one apps/server version entry in bun.lock, found {count}")
          lock_path.write_text(updated)
          PY

      - name: Publish server resource zips to R2
        working-directory: packages/browseros-agent
        run: bun scripts/build/server.ts --target=all --upload

      - name: Attach zips to GitHub release
        working-directory: packages/browseros-agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist/prod/server -maxdepth 1 -name 'browseros-server-resources-*.zip' | sort)
          if [ "${#assets[@]}" -ne 5 ]; then
            echo "::error::Expected 5 server resource zips, found ${#assets[@]}"
            printf 'Found asset: %s\n' "${assets[@]}"
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber

      - name: Summarize published resource keys
        run: |
          set -euo pipefail
          targets=(darwin-arm64 darwin-x64 linux-arm64 linux-x64 windows-x64)
          {
            echo "### BrowserOS Server resource publish"
            echo
            echo "- Version: \`$VERSION\`"
            echo "- GitHub release: \`$RELEASE_TAG\`"
            echo "- Upload behavior: wrote versioned keys and repointed latest keys"
            echo
            echo "Latest R2 keys:"
            for target in "${targets[@]}"; do
              echo "- \`artifacts/server/latest/browseros-server-resources-${target}.zip\`"
            done
            echo
            echo "Versioned R2 keys:"
            for target in "${targets[@]}"; do
              echo "- \`artifacts/server/${VERSION}/browseros-server-resources-${target}.zip\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup uv
        if: ${{ inputs.publish_ota == true }}
        uses: astral-sh/setup-uv@v8.2.0

      - name: Publish alpha server OTA artifacts
        if: ${{ inputs.publish_ota == true }}
        working-directory: packages/browseros
        run: uv run browseros ota server release --version "$VERSION" --channel alpha --product browseros

  reflect-version:
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch || 'main' }}

      # Reflect the released version back into the repo through a PR. The release
      # above is authoritative, but a failed reflection should leave a visible
      # red run and summary instead of looking like a successful sync.
      - name: Reflect version on main via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail

          PACKAGE_JSON="packages/browseros-agent/apps/server/package.json"
          LOCK="packages/browseros-agent/bun.lock"
          BRANCH="chore-bump-server-v${VERSION}"

          # Summarizes post-release sync failures without implying the release was rolled back.
          write_reflection_failure_summary() {
            local status="$1"
            [ "$status" -ne 0 ] || return 0

            echo "::error::Server version reflection failed after release publication; agent-server/v${VERSION} remains published."
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "### Server version reflection failed"
                echo
                echo "The BrowserOS Server release for \`agent-server/v${VERSION}\` was already published."
                echo "The follow-up version bump PR failed while using branch \`${BRANCH}\`."
                echo
                echo "Rerun the workflow or create the bump PR manually to sync \`${PACKAGE_JSON}\` and \`${LOCK}\`."
              } >> "$GITHUB_STEP_SUMMARY" || true
            fi
          }
          trap 'status=$?; write_reflection_failure_summary "$status"; exit "$status"' EXIT

          create_reflection_pr() {
            gh pr create \
              --title "chore: bump server version to ${VERSION}" \
              --body "Automated version bump for BrowserOS Server v${VERSION}, released from tag agent-server/v${VERSION}. The release is already published; merge this to keep apps/server/package.json in sync with the released version." \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH"

            gh pr merge "$BRANCH" --squash --auto || true
          }

          git fetch origin "$DEFAULT_BRANCH" --no-tags
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          CURRENT="$(node -e 'const fs = require("fs"); process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1], "utf8")).version)' "$PACKAGE_JSON")"
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "$PACKAGE_JSON already at $VERSION; nothing to bump."
            exit 0
          fi

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            EXISTING_PR="$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number // ""')"
            if [ -n "$EXISTING_PR" ]; then
              echo "Branch $BRANCH already has open bump PR #$EXISTING_PR."
              gh pr merge "$BRANCH" --squash --auto || true
              exit 0
            fi

            echo "Branch $BRANCH already exists without an open bump PR; creating it."
            create_reflection_pr
            exit 0
          fi

          node -e '
          const fs = require("fs");
          const [pkgPath, lockPath, version] = process.argv.slice(1);
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
          let lock = fs.readFileSync(lockPath, "utf8");
          const re = /("apps\/server":\s*\{\s*"name":\s*"@browseros\/server",\s*"version":\s*")(\d+\.\d+\.\d+)(")/g;
          const matches = lock.match(re);
          if (!matches || matches.length !== 1) {
            console.error("Expected exactly one apps/server version entry in bun.lock, found " + (matches ? matches.length : 0));
            process.exit(1);
          }
          fs.writeFileSync(lockPath, lock.replace(re, (match, prefix, _old, suffix) => prefix + version + suffix));
          ' "$PACKAGE_JSON" "$LOCK" "$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$PACKAGE_JSON" "$LOCK"
          git commit -m "chore: bump server version to ${VERSION}"
          git push origin "$BRANCH"

          create_reflection_pr
