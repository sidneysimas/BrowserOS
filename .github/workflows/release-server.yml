name: Release BrowserOS Server

on:
  push:
    tags:
      - "agent-server/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.0.123"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-server
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || github.event.deleted != true
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Resolve release
        id: release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          packages/browseros-agent/scripts/release/prepare-server-release.sh \
            --event-name "$EVENT_NAME" \
            --default-branch "$DEFAULT_BRANCH" \
            --ref-name "$REF_NAME" \
            --requested-version "$REQUESTED_VERSION"

      - name: Generate release notes
        env:
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -euo pipefail

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "Initial BrowserOS Server release." > /tmp/release-notes.md
          else
            git log "$PREVIOUS_TAG..$RELEASE_SHA" --pretty=format:"- %s (%h)" > /tmp/release-notes.md
            if [ ! -s /tmp/release-notes.md ]; then
              echo "No commits since $PREVIOUS_TAG." > /tmp/release-notes.md
            fi
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          TITLE="BrowserOS Server - v$VERSION"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file /tmp/release-notes.md
          fi
