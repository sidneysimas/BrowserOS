get:
  operationId: getSessionBrowserTabPreview
  parameters:
    - $ref: ../parameters.yaml#/SessionId
    - $ref: ../parameters.yaml#/BrowserTabId
  responses:
    '200':
      description: Latest cached JPEG frame for a browser tab currently owned by the session.
      content:
        image/jpeg:
          schema:
            type: string
            format: binary
    '400':
      $ref: ../responses.yaml#/BadRequest
    '404':
      description: The session and browser tab do not resolve to a currently owned preview.
      content:
        application/json:
          schema:
            $ref: ../schemas/system.yaml#/ApiError
          example:
            code: preview_not_found
            message: browser tab preview not found
    '500':
      $ref: ../responses.yaml#/InternalError
