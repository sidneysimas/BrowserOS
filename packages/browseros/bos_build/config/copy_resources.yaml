# Copy resources configuration for Nxtscape build
# This file defines all copy operations for resources during the build process
#
# Conditional Operations:
# - Use 'build_type' field to specify when an operation should run
#   - Supported build types: debug, release, dev, prod
#   - Operations without build_type run for all builds
# - Use 'os' field to specify target operating systems
#   - Supported values: windows, macos, linux (case-sensitive)
#   - Operations without os run for all platforms
# - Use 'arch' field to specify target architectures
#   - Supported values: x64, arm64
#   - Operations without arch run for all architectures
#
# Example:
#   - name: "macOS-only Binary"
#     source: "resources/binaries/macos_only"
#     destination: "chrome/browser/resources/macos/"
#     type: "directory"
#     os: ["macos"]
#
#   - name: "ARM64-only Library"
#     source: "resources/libs/arm64_optimized"
#     destination: "chrome/browser/lib/"
#     type: "directory"
#     arch: ["arm64"]
#
#   - name: "Windows x64 DLL"
#     source: "resources/dlls/x64/special.dll"
#     destination: "chrome/browser/resources/"
#     type: "file"
#     os: ["windows"]
#     arch: ["x64"]

copy_operations:
  # Version file
  - name: "BrowserOS Version File"
    source: "resources/BROWSEROS_VERSION"
    destination: "chrome/BROWSEROS_VERSION"
    type: "file"

  - name: "BrowserOS Product Logo Icons"
    source: "resources/browseros/icons/*.png"
    destination: "chrome/app/theme/chromium/"
    type: "files"
    product: "browseros"

  - name: "BrowserOS Product Logo AI Files"
    source: "resources/browseros/icons/*.ai"
    destination: "chrome/app/theme/chromium/"
    type: "files"
    product: "browseros"

  - name: "BrowserOS Product Logo SVG Files"
    source: "resources/browseros/icons/*.svg"
    destination: "chrome/app/theme/chromium/"
    type: "files"
    product: "browseros"

  - name: "BrowserOS ChromeOS Icons"
    source: "resources/browseros/icons/chromeos"
    destination: "chrome/app/theme/chromium/chromeos"
    type: "directory"
    product: "browseros"

  - name: "BrowserOS Linux Icons"
    source: "resources/browseros/icons/linux"
    destination: "chrome/app/theme/chromium/linux"
    type: "directory"
    product: "browseros"

  - name: "BrowserOS Mac Icons"
    source: "resources/browseros/icons/mac"
    destination: "chrome/app/theme/chromium/mac"
    type: "directory"
    product: "browseros"

  - name: "BrowserOS Windows Icons"
    source: "resources/browseros/icons/win"
    destination: "chrome/app/theme/chromium/win"
    type: "directory"
    product: "browseros"

  - name: "BrowserOS DPI 100% Icons"
    source: "resources/browseros/icons/default_100_percent"
    destination: "chrome/app/theme/default_100_percent/chromium"
    type: "directory"
    product: "browseros"

  - name: "BrowserOS DPI 200% Icons"
    source: "resources/browseros/icons/default_200_percent"
    destination: "chrome/app/theme/default_200_percent/chromium"
    type: "directory"
    product: "browseros"

  - name: "BrowserClaw Product Logo Icons"
    source: "resources/browserclaw/icons/*.png"
    destination: "chrome/app/theme/chromium/"
    type: "files"
    product: "browserclaw"

  - name: "BrowserClaw Product Logo AI Files"
    source: "resources/browserclaw/icons/*.ai"
    destination: "chrome/app/theme/chromium/"
    type: "files"
    product: "browserclaw"

  - name: "BrowserClaw Product Logo SVG Files"
    source: "resources/browserclaw/icons/*.svg"
    destination: "chrome/app/theme/chromium/"
    type: "files"
    product: "browserclaw"

  - name: "BrowserClaw ChromeOS Icons"
    source: "resources/browserclaw/icons/chromeos"
    destination: "chrome/app/theme/chromium/chromeos"
    type: "directory"
    product: "browserclaw"

  - name: "BrowserClaw Linux Icons"
    source: "resources/browserclaw/icons/linux"
    destination: "chrome/app/theme/chromium/linux"
    type: "directory"
    product: "browserclaw"

  - name: "BrowserClaw Mac Icons"
    source: "resources/browserclaw/icons/mac"
    destination: "chrome/app/theme/chromium/mac"
    type: "directory"
    product: "browserclaw"

  - name: "BrowserClaw Windows Icons"
    source: "resources/browserclaw/icons/win"
    destination: "chrome/app/theme/chromium/win"
    type: "directory"
    product: "browserclaw"

  - name: "BrowserClaw DPI 100% Icons"
    source: "resources/browserclaw/icons/default_100_percent"
    destination: "chrome/app/theme/default_100_percent/chromium"
    type: "directory"
    product: "browserclaw"

  - name: "BrowserClaw DPI 200% Icons"
    source: "resources/browserclaw/icons/default_200_percent"
    destination: "chrome/app/theme/default_200_percent/chromium"
    type: "directory"
    product: "browserclaw"

  # BrowserOS Server resources - Platform & Architecture specific
  - name: "BrowserOS Server Resources - macOS ARM64"
    source: "resources/binaries/browseros_server/darwin-arm64/resources"
    destination: "chrome/browser/browseros/server/resources"
    type: "directory"
    os: ["macos"]
    arch: ["arm64"]

  - name: "BrowserOS Server Resources - macOS x64"
    source: "resources/binaries/browseros_server/darwin-x64/resources"
    destination: "chrome/browser/browseros/server/resources"
    type: "directory"
    os: ["macos"]
    arch: ["x64"]

  - name: "BrowserOS Server Resources - Linux ARM64"
    source: "resources/binaries/browseros_server/linux-arm64/resources"
    destination: "chrome/browser/browseros/server/resources"
    type: "directory"
    os: ["linux"]
    arch: ["arm64"]

  - name: "BrowserOS Server Resources - Linux x64"
    source: "resources/binaries/browseros_server/linux-x64/resources"
    destination: "chrome/browser/browseros/server/resources"
    type: "directory"
    os: ["linux"]
    arch: ["x64"]

  - name: "BrowserOS Server Resources - Windows x64"
    source: "resources/binaries/browseros_server/windows-x64/resources"
    destination: "chrome/browser/browseros/server/resources"
    type: "directory"
    os: ["windows"]
    arch: ["x64"]

  # BrowserOS Claw Server resources - Bun ships by default.
  # Rust alternative: comment the Bun blocks below and uncomment the matching
  # Rust blocks to ship claw-server-rust; also flip download_resources.yaml and
  # nightly-browserclaw.yml.
  - name: "BrowserOS Claw Server Resources - macOS ARM64"
    source: "resources/binaries/browseros_claw_server/darwin-arm64/resources"
    destination: "chrome/browser/browseros/claw_server/resources"
    clear_destination: true
    type: "directory"
    product: "browserclaw"
    os: ["macos"]
    arch: ["arm64"]

