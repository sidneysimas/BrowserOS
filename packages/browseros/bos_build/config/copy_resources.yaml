  #   arch: ["arm64"]

  - name: "BrowserOS Claw Server Resources - macOS x64"
    source: "resources/binaries/browseros_claw_server/darwin-x64/resources"
    destination: "chrome/browser/browseros/claw_server/resources"
    clear_destination: true
    type: "directory"
    product: "browserclaw"
    os: ["macos"]
    arch: ["x64"]

